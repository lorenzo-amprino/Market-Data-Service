services:
  postgres:
    image: postgres:17-alpine
    container_name: market-data-postgres
    environment:
      POSTGRES_DB: market_data
      POSTGRES_USER: market_data
      POSTGRES_PASSWORD: market_data
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_data -d market_data"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
